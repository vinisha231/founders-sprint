name: Ship Guard

# Runs Build → Validate → Secure on every pull request, scanning only
# the lines the PR changed against its base branch.

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  ship-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Ship Guard on the diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            node cli.js --range "origin/${{ github.base_ref }}...HEAD"
          else
            node cli.js --range "${{ github.event.before }}...${{ github.sha }}"
          fi
